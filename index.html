<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Jet Shooting Game</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-overlay">
            <!-- Start Screen -->
            <div id="start-screen" class="screen">
                <h1>JET SHOOTER</h1>
                <p class="instructions">
                    WASD / Arrow Keys - Move<br>
                    Spacebar / Click - Shoot<br>
                    P / Escape - Pause
                </p>
                <p class="instructions touch-instructions">
                    Touch: Joystick to move, Fire button to shoot
                </p>
                <button id="start-button" class="menu-button">START GAME</button>
            </div>

            <!-- Pause Screen -->
            <div id="pause-screen" class="screen hidden">
                <h2>PAUSED</h2>
                <button id="resume-button" class="menu-button">RESUME</button>
                <button id="quit-button" class="menu-button">QUIT TO MENU</button>
            </div>

            <!-- Game Over Screen -->
            <div id="gameover-screen" class="screen hidden">
                <h2>GAME OVER</h2>
                <p id="final-score">Score: 0</p>
                <p id="high-score">High Score: 0</p>
                <button id="restart-button" class="menu-button">PLAY AGAIN</button>
                <button id="leaderboard-button" class="menu-button">LEADERBOARD</button>
                <button id="menu-button" class="menu-button">MAIN MENU</button>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div id="hud-left">
                <div id="health-container">
                    <span>HP</span>
                    <div id="health-bar">
                        <div id="health-fill"></div>
                    </div>
                </div>
                <div id="lives-container">
                    <span>LIVES:</span>
                    <span id="lives-display">3</span>
                </div>
            </div>
            <div id="hud-center">
                <div id="score-display">SCORE: 0</div>
            </div>
            <div id="hud-right">
                <div id="powerup-display"></div>
            </div>
        </div>

        <!-- Boss Health Bar -->
        <div id="boss-health-container" class="hidden">
            <span id="boss-name">BOSS</span>
            <div id="boss-health-bar">
                <div id="boss-health-fill"></div>
            </div>
        </div>

        <!-- Audio Controls -->
        <div id="audio-controls">
            <button id="mute-button" class="icon-button" title="Toggle Sound">
                <span id="sound-icon">🔊</span>
            </button>
        </div>

        <!-- Touch Controls -->
        <div id="touch-controls" class="hidden">
            <div id="joystick-base">
                <div id="joystick-knob"></div>
            </div>
            <div id="fire-button">
                <span>FIRE</span>
            </div>
        </div>

        <!-- Leaderboard Modal -->
        <div id="leaderboard-modal" class="modal hidden">
            <div class="modal-content">
                <h2>LEADERBOARD</h2>

                <!-- Name Input Section -->
                <div id="name-input-section" class="hidden">
                    <p id="new-score-msg">NEW HIGH SCORE!</p>
                    <p id="your-score-display"></p>
                    <input type="text" id="player-name-input"
                           placeholder="Enter your name"
                           maxlength="10"
                           autocomplete="off">
                    <p id="name-error" class="error-text"></p>
                    <button id="submit-score-button" class="menu-button">SUBMIT</button>
                </div>

                <!-- Scores List -->
                <div id="scores-list-section">
                    <ol id="scores-list"></ol>
                    <p id="loading-scores">Loading scores...</p>
                    <p id="no-scores" class="hidden">No scores yet. Be the first!</p>
                </div>

                <button id="close-leaderboard-button" class="menu-button">CLOSE</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
